name: gkit-build-test

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build-and-test:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        # build_type: [Debug, Release]
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Show build information
      run: |
        echo "🚀 Starting build for gkit project"
        echo "Platform: ${{ runner.os }}"
        echo "Workflow: ${{ github.workflow }}"
        echo "Repository: ${{ github.repository }}"
        echo "Commit SHA: ${{ github.sha }}"

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        echo "📦 Installing Ubuntu dependencies..."
        sudo apt-get update
        sudo apt-get install -y cmake build-essential ninja-build
        echo "✅ Ubuntu dependencies installed successfully"

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        echo "📦 Installing Windows dependencies..."
        choco install cmake
        choco install ninja
        echo "✅ Windows dependencies installed successfully"

    # - name: Install dependencies (macOS)
    #   if: runner.os == 'macOS'
    #   run: |
    #     brew install sdl3
    #     brew install cmake

    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      run: |
        echo "⚙️ Configuring CMake for Linux..."
        echo "Using preset: linux-x86_64-gcc-debug"
        cmake --preset linux-x86_64-gcc-debug
        echo "✅ CMake configuration completed"

    - name: Configure and build project (Linux)
      if: runner.os == 'Linux'
      run: |
        echo "🔨 Building project on Linux..."
        BUILD_DIR="${{ github.workspace }}/build/linux-x86_64-gcc-debug"
        echo "Build directory: $BUILD_DIR"
        cmake --build $BUILD_DIR
        echo "✅ Linux build completed successfully"

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: |
        echo "⚙️ Configuring CMake for Windows..."
        echo "Using preset: windows-x86_64-mingw64-debug"
        cmake --preset windows-x86_64-mingw64-debug
        echo "✅ CMake configuration completed"

    - name: Configure and build project (Windows)
      if: runner.os == 'Windows'
      run: |
        echo "🔨 Building project on Windows..."
        BUILD_DIR="${{ github.workspace }}/build/windows-x86_64-mingw64-debug"
        echo "Build directory: $BUILD_DIR"
        cmake --build $BUILD_DIR
        echo "✅ Windows build completed successfully"

    - name: Show build results
      run: |
        echo "🎉 Build process completed!"
        echo "Platform: ${{ runner.os }}"
        echo "Job status: ${{ job.status }}"
        
        # List built files
        echo "📁 Built files:"
        find ${{ github.workspace }}/build -name "*.so" -o -name "*.dll" -o -name "*.a" -o -name "*.lib" 2>/dev/null || echo "No library files found"
        
        # Show disk usage
        echo "💾 Disk usage:"
        du -sh ${{ github.workspace }}/build 2>/dev/null || echo "Build directory size info not available"