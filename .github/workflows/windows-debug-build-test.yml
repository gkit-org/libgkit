name: gkit-windows-build-test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test on Windows
    runs-on: windows-latest
    strategy:
      matrix:
        preset: [ "windows-x86_64-mingw64-debug",
                  "windows-x86_64-llvm-debug",
                  "windows-x86_64-msvc-debug",]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Show build information
      run: |
        echo "🚀 Starting build for gkit project"
        echo "Platform: ${{ runner.os }}"
        echo "Workflow: ${{ github.workflow }}"
        echo "Repository: ${{ github.repository }}"
        echo "Commit SHA: ${{ github.sha }}"

    - name: Install Python dependencies
      shell: cmd
      run: |
        echo "📦 Installing Python dependencies..."
        C:\hostedtoolcache\windows\Python\3.14.4\x64\python3.exe -m pip install jinja2
        echo "✅ Python dependencies installed successfully"

    - name: Configure MSVC
      if: ${{ matrix.preset == 'windows-x86_64-msvc-debug' || matrix.preset == 'windows-x86_64-msvc-noabi-debug' }}
      uses: TheMrMilchmann/setup-msvc-dev@v4.0.0
      with:
        arch: x64

    - name: Configure CMake
      run: |
        echo "⚙️ Configuring CMake ..."
        echo "Using preset: ${{matrix.preset}}"
        cmake --preset ${{matrix.preset}}
        echo "✅ CMake configuration completed"

    - name: Configure and build project
      shell: pwsh
      run: |
        echo "Building project..."
        $BUILD_DIR = "${{ github.workspace }}/build/${{matrix.preset}}"
        echo "Build directory: $BUILD_DIR"
        cmake --build $BUILD_DIR
        echo "Windows build completed successfully"

    - name: Show build results
      run: |
        echo "🎉 Build process completed!"
        echo "Platform: ${{ runner.os }}"
        echo "Job status: ${{ job.status }}"